  <!-- Critical inline styles for instant app shell -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Fira Sans','Droid Sans','Helvetica Neue',sans-serif;background:#f0f2f8;color:#1f2937;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    #root{min-height:100vh;display:flex;flex-direction:column}

    #app-shell{display:flex;min-height:100vh}

    /* Sidebar - Desktop only */
    .shell-sb{display:none;position:fixed;left:0;top:0;bottom:0;width:220px;background:#fff;border-right:1px solid #f3f4f6;z-index:40;flex-direction:column}
    @media(min-width:768px){.shell-sb{display:flex}}
    .shell-sb-hdr{height:76px;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
    .shell-sb-logo{width:40px;height:40px;border-radius:12px;overflow:hidden;flex-shrink:0}
    .shell-sb-logo img{width:100%;height:100%;object-fit:cover}
    .shell-sb-title{margin-left:12px;font-weight:900;font-size:18px;color:#111827;white-space:nowrap}
    .shell-sb-nav{flex:1;padding:12px;display:flex;flex-direction:column;gap:4px}
    .shell-sb-item{height:44px;display:flex;align-items:center;padding:0 10px;border-radius:12px}
    .shell-sb-item.active{background:#6eabc6;color:#fff}
    .shell-sb-item:not(.active){background:#f9fafb}
    .shell-sb-dot{width:22px;height:22px;border-radius:6px;background:#e5e7eb;flex-shrink:0}
    .shell-sb-dot.active{background:#fff}
    .shell-sb-label{margin-left:12px;height:12px;border-radius:4px;background:#e5e7eb}
    .shell-sb-label.active{background:rgba(255,255,255,0.5)}
    .shell-sb-ftr{padding:12px;border-top:1px solid #f3f4f6;flex-shrink:0}

    /* Content area */
    .shell-ct{flex:1;min-width:0;padding-bottom:80px}
    @media(min-width:768px){.shell-ct{margin-left:220px}}

    /* Header gradient */
    .shell-hdr{background:linear-gradient(to bottom,#111827,#111827);padding:40px 24px 64px;position:relative;overflow:hidden}
    .shell-hdr-bg{position:absolute;top:0;right:0;width:256px;height:256px;background:#6eabc6;border-radius:50%;mix-blend-mode:screen;filter:blur(80px);opacity:0.1;pointer-events:none}
    .shell-hdr-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
    .shell-hdr-brand{display:flex;align-items:center;gap:8px}
    .shell-hdr-brand img{width:32px;height:32px;border-radius:6px}
    .shell-hdr-brand span{color:#fff;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;opacity:0.9}
    .shell-hdr-actions{display:flex;gap:12px}
    .shell-hdr-icon{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);flex-shrink:0}
    .shell-greeting{position:relative;z-index:1;margin-top:16px}
    .shell-greeting-l1{height:28px;width:200px;border-radius:6px;background:rgba(255,255,255,0.1)}
    .shell-greeting-l2{height:12px;width:120px;border-radius:4px;background:rgba(255,255,255,0.08);margin-top:8px}
    .shell-widgets{display:flex;gap:8px;margin-top:16px;position:relative;z-index:1}
    .shell-wdgt{height:46px;border-radius:16px;background:rgba(255,255,255,0.08)}

    /* Cards */
    .shell-body{padding:16px 20px;margin-top:-32px;position:relative;z-index:2}
    .shell-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
    .shell-card-line{height:14px;background:#f3f4f6;border-radius:6px;margin-bottom:10px}
    .shell-card-line-sm{width:60%}

    /* Tab Bar - Mobile only */
    .shell-tb{display:flex;position:fixed;bottom:0;left:0;right:0;padding:8px 12px calc(12px + env(safe-area-inset-bottom,0px));z-index:50}
    @media(min-width:768px){.shell-tb{display:none}}
    .shell-tb-inner{background:#fff;border-radius:16px;padding:0 8px;height:62px;display:flex;align-items:center;justify-content:space-around;width:100%;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1)}
    .shell-tb-tab{height:40px;width:44px;border-radius:12px;background:#f3f4f6}

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .shell-pulse{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
  </style>
</head>

<body>
  <div id="root">
    <!-- App Shell Skeleton - instantly paints the app layout -->
    <div id="app-shell">
      <!-- Sidebar (Desktop) -->
      <div class="shell-sb">
        <div class="shell-sb-hdr">
          <div class="shell-sb-logo"><img src="/logo.png" alt="Campus Guide" /></div>
          <div class="shell-sb-title">Campus Guide</div>
        </div>
        <div class="shell-sb-nav">
          <div class="shell-sb-item active"><div class="shell-sb-dot active shell-pulse" style="background:#ffffff50"></div><div class="shell-sb-label active" style="background:rgba(255,255,255,0.5)"></div></div>
          <div class="shell-sb-item"><div class="shell-sb-dot shell-pulse"></div><div class="shell-sb-label shell-pulse"></div></div>
          <div class="shell-sb-item"><div class="shell-sb-dot shell-pulse"></div><div class="shell-sb-label shell-pulse"></div></div>
          <div class="shell-sb-item"><div class="shell-sb-dot shell-pulse"></div><div class="shell-sb-label shell-pulse"></div></div>
          <div class="shell-sb-item"><div class="shell-sb-dot shell-pulse"></div><div class="shell-sb-label shell-pulse"></div></div>
        </div>
        <div class="shell-sb-ftr"><div class="shell-sb-item"><div class="shell-sb-dot shell-pulse"></div><div class="shell-sb-label shell-pulse"></div></div></div>
      </div>

      <!-- Content -->
      <div class="shell-ct">
        <!-- Header section -->
        <div class="shell-hdr">
          <div class="shell-hdr-bg"></div>
          <div class="shell-hdr-top">
            <div class="shell-hdr-brand"><img src="/logo.png" alt="" /><span>Campus Guide</span></div>
            <div class="shell-hdr-actions"><div class="shell-hdr-icon shell-pulse"></div><div class="shell-hdr-icon shell-pulse"></div></div>
          </div>
          <div class="shell-greeting">
            <div class="shell-greeting-l1 shell-pulse"></div>
            <div class="shell-greeting-l2 shell-pulse"></div>
          </div>
          <div class="shell-widgets">
            <div class="shell-wdgt shell-pulse" style="width:80px"></div>
            <div class="shell-wdgt shell-pulse" style="width:64px"></div>
            <div class="shell-wdgt shell-pulse" style="width:64px"></div>
          </div>
        </div>

        <!-- Card skeletons -->
        <div class="shell-body">
          <div class="shell-card"><div class="shell-card-line shell-pulse"></div><div class="shell-card-line shell-pulse"></div><div class="shell-card-line shell-card-line-sm shell-pulse"></div></div>
          <div class="shell-card"><div class="shell-card-line shell-pulse"></div><div class="shell-card-line shell-pulse"></div></div>
          <div class="shell-card"><div class="shell-card-line shell-pulse" style="width:40%"></div><div class="shell-card-line shell-pulse" style="width:80%"></div></div>
        </div>
      </div>

      <!-- Tab Bar (Mobile) -->
      <div class="shell-tb">
        <div class="shell-tb-inner">
          <div class="shell-tb-tab shell-pulse"></div>
          <div class="shell-tb-tab shell-pulse"></div>
          <div class="shell-tb-tab shell-pulse"></div>
          <div class="shell-tb-tab shell-pulse"></div>
          <div class="shell-tb-tab shell-pulse"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>

  <script>

        ga.async = true;
        document.head.appendChild(ga);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-2QRPP6PB27');
      }, 3000);
    });
  </script>

</body>

</html>
