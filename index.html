  <style>
    /* Premium Native App Loading Screen Styles */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #002F45; /* Brand color background */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #root {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100%;
    }
    .splash-logo {
      width: 90px;
      height: 90px;
      margin-bottom: 24px;
      animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
    }
    .splash-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 1s ease-in-out infinite;
    }
    .splash-text {
      margin-top: 24px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      animation: fadePulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.95); opacity: 0.8; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadePulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
  <div id="root">
    <img src="/logo.png" alt="Campus Guide Logo" class="splash-logo" />
    <div class="splash-spinner"></div>
    <div class="splash-text">Launching Campus Guide...</div>
  </div>
